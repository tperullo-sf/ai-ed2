name: Weekly Jira Account Summary

on:
  schedule:
    # 9:00 AM EDT (UTC-4) every Friday.
    # Note: during EST (UTC-5, Nov–Mar) this fires at 8:00 AM ET.
    # Adjust to '0 14 * * 5' if you prefer 9 AM EST year-round.
    - cron: '0 13 * * 5'
  workflow_dispatch: # allow manual test runs

jobs:
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly Jira summary agent
        env:
          JIRA_EMAIL:         ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN:     ${{ secrets.JIRA_API_TOKEN }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          RECIPIENT_EMAIL:    ${{ secrets.RECIPIENT_EMAIL }}
        run: python src/jira_weekly_summary.py
